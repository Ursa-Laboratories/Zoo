# ASMI indentation protocol for the CubOS deck-origin frame.
#
# +Z is up. Heights on `scan` (`measurement_height`, `interwell_scan_height`,
# `indentation_limit_height`) are *labware-relative* offsets above the
# well's calibrated deck-frame surface Z. Inter-labware travel uses the
# gantry's `safe_z`. Run only after staged jog-direction, homing, WPos
# calibration, and clearance checks pass.

positions:
  # High park pose near the back-right/home side, intentionally below the
  # physical max Z but high enough to clear the Y rail in the side view.
  park_position: [360.0, 260.0, 85.0]

protocol:
  - home:

  - scan:
      plate: plate
      instrument: asmi
      method: indentation
      # Labware-relative offsets above the well surface (mm; negative = below).
      measurement_height: -1.0       # 1 mm into the well for seating
      interwell_scan_height: 8.0     # 8 mm above the well surface
      indentation_limit_height: -5.0 # 5 mm into the well at deepest descent
      method_kwargs:
        step_size: 0.1
        force_limit: 10.0
        baseline_samples: 10
        measure_with_return: false

  - move:
      instrument: asmi
      position: park_position
      travel_z: 85.0

  - home:
